<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baustellenkontrolle</title>
  <style>
    :root {
      --bg: #f8fafc;
      --text: #0f172a;
      --card: #ffffff;
      --border: #cbd5e1;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Baustellenkontrolle</h1>
      <p>Die Website läuft.</p>
      <p>Wenn du das siehst, funktioniert GitHub Pages korrekt.</p>
    </div>
  </div>
</body>
</html>
