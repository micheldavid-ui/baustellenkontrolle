    *{box-sizing:border-box} html,body{margin:0;min-height:100%} body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}

<body>
<div id="app"></div>
<script>
var STORAGE_KEY='baustellenkontrolle_singlefile_v2';
var STANDARD_COMPONENTS=['Fundament','Einzelfundament','Streifenfundament','Bodenplatte','Wand','Stütze','Unterzug','Überzug','Decke','Treppe','Balkonplatte','Attika','Ringbalken','Ringanker','Sturz','Binder','Pfette','Mauerwerk','Fertigteilwand','Fertigteildecke'];
var ASPECT_SUGGESTIONS=['untere Bewehrung','obere Bewehrung','Schubbewehrung','Anschlussbewehrung','Bügel','Betondeckung','Durchstanzbewehrung','Schalung','Abmessungen','Einbauteile'];
var pendingFocus=null;
var pendingPhotoFiles=[];
var pendingPhotoUrls=[];
var photoDbPromise=null;
var photoUrlCache={};
var activePhotoViewer=null;
function initialState(){return{projects:[{id:'p1',name:'Wohnanlage Musterstraße',location:'Hamburg',favorite:true,structures:[{id:'s1',name:'Gebäude A',inspections:[{id:'i1',date:'2026-04-17',inspector:'Michel',points:[{id:'pt1',component:'Fundament F5',aspect:'untere Bewehrung',status:'Mangel',note:'zu große Abstände',photos:1,createdAt:'09:10',photoNames:[]},{id:'pt2',component:'Fundament F5',aspect:'obere Bewehrung',status:'OK',note:'',photos:0,createdAt:'09:14',photoNames:[]},{id:'pt3',component:'Wand W2',aspect:'Schubbewehrung',status:'Mangel',note:'fehlt unterhalb der Wand',photos:2,createdAt:'09:22',photoNames:[]}]}]},{id:'s2',name:'Gebäude B',inspections:[]},{id:'s3',name:'Tiefgarage',inspections:[]}]},{id:'p2',name:'Logistikhalle Nord',location:'Bremen',favorite:true,structures:[{id:'s4',name:'Halle 1',inspections:[]}]},{id:'p3',name:'Parkhaus Innenstadt',location:'Kiel',favorite:false,structures:[{id:'s5',name:'Bauwerk Ost',inspections:[]},{id:'s6',name:'Bauwerk West',inspections:[]}]}],selectedProjectId:'p1',selectedStructureId:'s1',selectedInspectionId:'i1',tab:'projekte',search:'',favoritesOnly:false,editingPointId:null,isMobileNavOpen:true,dialogs:{project:false,structure:false},projectForm:{id:null,name:'',location:'',firstStructure:''},structureForm:{id:null,name:''},form:{component:'',aspect:'',status:'OK',note:'',photoAttached:false,photoCount:0,photoNames:[],photoRefs:[]}}}
function loadState(){try{var raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):null}catch(e){return null}}
var state=loadState()||initialState();
normalizeState(state);

function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function normalizeState(snapshot){
  if(!snapshot.dialogs)snapshot.dialogs={project:false,structure:false};
  if(!snapshot.projectForm)snapshot.projectForm={id:null,name:'',location:'',firstStructure:''};
  if(!snapshot.structureForm)snapshot.structureForm={id:null,name:''};
  if(!snapshot.form)snapshot.form={component:'',aspect:'',status:'OK',note:'',photoAttached:false,photoCount:0,photoNames:[],photoRefs:[]};
  if(!snapshot.form.photoRefs)snapshot.form.photoRefs=[];
  snapshot.projects=(snapshot.projects||[]).map(function(project){
    project.structures=(project.structures||[]).map(function(structure){
      structure.inspections=(structure.inspections||[]).map(function(inspection){
        inspection.points=(inspection.points||[]).map(function(point){
          if(!point.photoRefs)point.photoRefs=[];
          if(!point.photoNames)point.photoNames=point.photoRefs.map(function(ref){return ref.name||'Foto'});
          point.photos=point.photoRefs.length||point.photos||0;
          return point;
        });
        return inspection;
      });
      return structure;
    });
    return project;
  });
}
function openPhotoDb(){
  if(photoDbPromise)return photoDbPromise;
  photoDbPromise=new Promise(function(resolve,reject){
    var req=indexedDB.open('baustellenkontrolle_photos_v1',1);
    req.onupgradeneeded=function(){
      var db=req.result;
      if(!db.objectStoreNames.contains('photos'))db.createObjectStore('photos',{keyPath:'id'});
    };
    req.onsuccess=function(){resolve(req.result)};
    req.onerror=function(){reject(req.error||new Error('IndexedDB konnte nicht geöffnet werden'))};
  });
  return photoDbPromise;
}
function putPhotoRecord(record){
  return openPhotoDb().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('photos','readwrite');
      tx.objectStore('photos').put(record);
      tx.oncomplete=function(){resolve(record)};
      tx.onerror=function(){reject(tx.error||new Error('Foto konnte nicht gespeichert werden'))};
    });
  });
}
function getPhotoRecord(id){
  return openPhotoDb().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('photos','readonly');
      var req=tx.objectStore('photos').get(id);
      req.onsuccess=function(){resolve(req.result||null)};
      req.onerror=function(){reject(req.error||new Error('Foto konnte nicht geladen werden'))};
    });
  });
}
function deletePhotoRecord(id){
  return openPhotoDb().then(function(db){
    return new Promise(function(resolve,reject){
      var tx=db.transaction('photos','readwrite');
      tx.objectStore('photos')['delete'](id);
      tx.oncomplete=function(){resolve()};
      tx.onerror=function(){reject(tx.error||new Error('Foto konnte nicht gelöscht werden'))};
    });
  });
}
function revokePendingPhotoUrls(){
  pendingPhotoUrls.forEach(function(url){try{URL.revokeObjectURL(url)}catch(e){}});
  pendingPhotoUrls=[];
}
function resetPendingPhotos(){
  pendingPhotoFiles=[];
  revokePendingPhotoUrls();
}
function createPendingPhotoUrls(files){
  revokePendingPhotoUrls();
  pendingPhotoUrls=files.map(function(file){return URL.createObjectURL(file)});
}
function ensurePhotoUrl(photoId){
  if(photoUrlCache[photoId])return Promise.resolve(photoUrlCache[photoId]);
  return getPhotoRecord(photoId).then(function(record){
    if(!record||!record.blob)return '';
    var url=URL.createObjectURL(record.blob);
    photoUrlCache[photoId]=url;
    return url;
  }).catch(function(){return ''});
}
function deletePhotoRefs(refs){
  refs=(refs||[]).filter(function(ref){return ref&&ref.id});
  return Promise.all(refs.map(function(ref){
    if(photoUrlCache[ref.id]){try{URL.revokeObjectURL(photoUrlCache[ref.id])}catch(e){} delete photoUrlCache[ref.id];}
    return deletePhotoRecord(ref.id).catch(function(){});
  }));
}
function savePendingPhotos(){
  var files=pendingPhotoFiles.slice();
  if(!files.length)return Promise.resolve([]);
  return Promise.all(files.map(function(file,index){
    var id='ph'+Date.now()+'_'+index+'_'+Math.random().toString(36).slice(2,8);
    return putPhotoRecord({id:id,blob:file,name:file.name||('Foto '+(index+1)),type:file.type||'image/jpeg',size:file.size||0,createdAt:Date.now()}).then(function(){
      return {id:id,name:file.name||('Foto '+(index+1)),type:file.type||'image/jpeg',size:file.size||0};
    });
  }));
}
function hydratePhotoPreviews(){
  document.querySelectorAll('[data-photo-ref]').forEach(function(img){
    var id=img.getAttribute('data-photo-ref');
    if(!id)return;
    ensurePhotoUrl(id).then(function(url){
      if(url)img.src=url;
    });
  });
}
function photoStripHtml(refs, tempUrls){
  refs=refs||[]; tempUrls=tempUrls||[];
  if(!refs.length && !tempUrls.length)return '';
  var existing=refs.map(function(ref){return '<button type="button" class="photo-thumb" data-open-photo="'+escapeAttr(ref.id)+'" aria-label="Foto öffnen"><img alt="'+escapeAttr(ref.name||'Foto')+'" data-photo-ref="'+escapeAttr(ref.id)+'"></button>';}).join('');
  var temp=tempUrls.map(function(url,idx){return '<span class="photo-thumb"><img alt="Ausgewähltes Foto '+String(idx+1)+'" src="'+escapeAttr(url)+'"></span>';}).join('');
  return '<div class="photo-strip">'+existing+temp+'</div>';
}
function photoViewerHtml(){
  if(!activePhotoViewer)return '';
  return '<div class="photo-viewer-backdrop" data-close-photo-viewer="1"><div class="photo-viewer" onclick="event.stopPropagation()"><div class="photo-viewer-head"><strong>'+escapeHtml(activePhotoViewer.name||'Foto')+'</strong><button class="btn btn-ghost btn-icon" data-close-photo-viewer="1">×</button></div><div class="photo-viewer-body"><img alt="'+escapeAttr(activePhotoViewer.name||'Foto')+'" data-photo-ref="'+escapeAttr(activePhotoViewer.id)+'"></div></div></div>';
}
function collectPhotoRefsFromPoint(point){return (point&&point.photoRefs)||[]}
function collectPhotoRefsFromInspection(inspection){var refs=[];(inspection&&inspection.points||[]).forEach(function(point){refs=refs.concat(collectPhotoRefsFromPoint(point))});return refs}
function collectPhotoRefsFromStructure(structure){var refs=[];(structure&&structure.inspections||[]).forEach(function(inspection){refs=refs.concat(collectPhotoRefsFromInspection(inspection))});return refs}
function collectPhotoRefsFromProject(project){var refs=[];(project&&project.structures||[]).forEach(function(structure){refs=refs.concat(collectPhotoRefsFromStructure(structure))});return refs}
function openPhotoViewer(id,name){activePhotoViewer={id:id,name:name||'Foto'};render()}
function closePhotoViewer(){activePhotoViewer=null;render()}
function todayIso(){return new Date().toISOString().slice(0,10)} function nowTime(){return new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} function formatDate(d){return new Date(d).toLocaleDateString('de-DE',{year:'numeric',month:'2-digit',day:'2-digit'})}
function cls(){return Array.prototype.slice.call(arguments).filter(Boolean).join(' ')}
function selectedProject(){var p=state.projects.find(function(x){return x.id===state.selectedProjectId});return p||state.projects[0]||null}
function selectedStructure(){var p=selectedProject();if(!p)return null;var s=p.structures.find(function(x){return x.id===state.selectedStructureId});return s||p.structures[0]||null}
function selectedInspection(){var s=selectedStructure();if(!s)return null;var i=s.inspections.find(function(x){return x.id===state.selectedInspectionId});return i||s.inspections[0]||null}
function iconSvg(name,opts){var filled=opts&&opts.filled;if(name==='star')return '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-icon '+(filled?'is-filled':'')+'"><path d="M12 3.75l2.55 5.16 5.7.83-4.12 4.02.97 5.68L12 16.76l-5.1 2.68.97-5.68L3.75 9.74l5.7-.83L12 3.75z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';if(name==='pencil')return '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-icon"><path d="M4 20l4.2-.9L18.5 8.8a1.8 1.8 0 0 0 0-2.6l-.7-.7a1.8 1.8 0 0 0-2.6 0L4.9 15.8 4 20z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M13.8 6.8l3.4 3.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';if(name==='trash')return '<svg viewBox="0 0 24 24" aria-hidden="true" class="ui-icon"><path d="M5 7h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M9 7V5.8c0-.7.5-1.3 1.2-1.3h3.6c.7 0 1.2.6 1.2 1.3V7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7.2 7l.8 11c.1.9.8 1.5 1.7 1.5h4.6c.9 0 1.6-.6 1.7-1.5l.8-11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 10.5v5.5M14 10.5v5.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';return ''}
function filteredProjects(){var q=state.search.toLowerCase();return state.projects.filter(function(project){var fav=state.favoritesOnly?project.favorite:true;var match=!q||project.name.toLowerCase().indexOf(q)!==-1||(project.location||'').toLowerCase().indexOf(q)!==-1||project.structures.some(function(s){return s.name.toLowerCase().indexOf(q)!==-1});return fav&&match})}
function componentSuggestions(){var set=new Set(STANDARD_COMPONENTS),project=selectedProject();if(project){project.structures.forEach(function(s){s.inspections.forEach(function(i){i.points.forEach(function(pt){if(pt.component)set.add(pt.component)})})})}var q=state.form.component.trim().toLowerCase(),arr=Array.from(set);return (!q?arr:arr.filter(function(x){return x.toLowerCase().indexOf(q)!==-1})).slice(0,8)}
function aspectSuggestions(){var q=state.form.aspect.trim().toLowerCase();return (!q?ASPECT_SUGGESTIONS:ASPECT_SUGGESTIONS.filter(function(x){return x.toLowerCase().indexOf(q)!==-1})).slice(0,6)}
function ensureSelection(){if(!state.projects.length)return;if(!state.projects.some(function(x){return x.id===state.selectedProjectId}))state.selectedProjectId=state.projects[0].id;var p=selectedProject();if(p&&!p.structures.some(function(x){return x.id===state.selectedStructureId}))state.selectedStructureId=p.structures[0]?p.structures[0].id:'';var s=selectedStructure();if(s&&!s.inspections.some(function(x){return x.id===state.selectedInspectionId}))state.selectedInspectionId=s.inspections[0]?s.inspections[0].id:''}
function update(mutator){mutator();ensureSelection();saveState();render()}
function resetPointForm(keep){resetPendingPhotos();state.form={component:keep?state.form.component:'',aspect:'',status:'OK',note:'',photoAttached:false,photoCount:0,photoNames:[],photoRefs:[]};state.editingPointId=null}
function openProjectDialog(edit){state.projectForm=edit?{id:edit.id,name:edit.name,location:edit.location||'',firstStructure:''}:{id:null,name:'',location:'',firstStructure:''};state.dialogs.project=true;render()}
function openStructureDialog(edit){state.structureForm=edit?{id:edit.id,name:edit.name}:{id:null,name:''};state.dialogs.structure=true;render()}
function selectProjectAction(project){update(function(){state.selectedProjectId=project.id;state.selectedStructureId=project.structures[0]?project.structures[0].id:'';state.selectedInspectionId=project.structures[0]&&project.structures[0].inspections[0]?project.structures[0].inspections[0].id:'';state.tab='bauwerke'})}
function selectStructureAction(structure){update(function(){state.selectedStructureId=structure.id;state.selectedInspectionId=structure.inspections[0]?structure.inspections[0].id:'';state.tab='kontrollen'})}
function createProject(){if(!state.projectForm.name.trim())return;update(function(){if(state.projectForm.id){state.projects=state.projects.map(function(project){return project.id!==state.projectForm.id?project:{id:project.id,name:state.projectForm.name.trim(),location:state.projectForm.location.trim(),favorite:project.favorite,structures:project.structures}})}else{var stamp=Date.now();var newProject={id:'p'+stamp,name:state.projectForm.name.trim(),location:state.projectForm.location.trim(),favorite:false,structures:[{id:'s'+stamp,name:state.projectForm.firstStructure.trim()||'Bauwerk 1',inspections:[]}]};state.projects.unshift(newProject);state.selectedProjectId=newProject.id;state.selectedStructureId=newProject.structures[0].id;state.selectedInspectionId='';state.tab='bauwerke'}state.dialogs.project=false;state.projectForm={id:null,name:'',location:'',firstStructure:''}})}
function createStructure(){var project=selectedProject();if(!project||!state.structureForm.name.trim())return;update(function(){if(state.structureForm.id){project.structures=project.structures.map(function(structure){return structure.id!==state.structureForm.id?structure:{id:structure.id,name:state.structureForm.name.trim(),inspections:structure.inspections}});state.selectedStructureId=state.structureForm.id}else{var stamp=Date.now();var newStructure={id:'s'+stamp,name:state.structureForm.name.trim(),inspections:[]};project.structures.push(newStructure);state.selectedStructureId=newStructure.id;state.selectedInspectionId=''}state.tab='bauwerke';state.dialogs.structure=false;state.structureForm={id:null,name:''}})}

function savePoint(opts){
  opts=opts||{};
  var inspection=selectedInspection();
  if(!inspection||!state.form.component.trim())return;
  var existingPoint=state.editingPointId?inspection.points.find(function(p){return p.id===state.editingPointId}):null;
  var oldRefs=existingPoint?(existingPoint.photoRefs||[]):[];
  savePendingPhotos().then(function(newRefs){
    var finalRefs=pendingPhotoFiles.length?newRefs:(state.form.photoRefs||oldRefs||[]);
    update(function(){
      var payload={
        component:state.form.component.trim(),
        aspect:state.form.aspect.trim(),
        status:state.form.status,
        note:state.form.note.trim(),
        photos:finalRefs.length,
        photoNames:finalRefs.map(function(ref){return ref.name||'Foto'}),
        photoRefs:finalRefs
      };
      if(state.editingPointId){
        inspection.points=inspection.points.map(function(p){
          return p.id!==state.editingPointId?p:{id:p.id,component:payload.component,aspect:payload.aspect,status:payload.status,note:payload.note,photos:payload.photos,photoNames:payload.photoNames,photoRefs:payload.photoRefs,createdAt:p.createdAt};
        });
      }else{
        inspection.points.unshift({id:'pt'+Date.now(),component:payload.component,aspect:payload.aspect,status:payload.status,note:payload.note,photos:payload.photos,photoNames:payload.photoNames,photoRefs:payload.photoRefs,createdAt:nowTime()});
      }
      resetPointForm(!!opts.keepComponent);
      if(opts.closeAfter)state.tab='kontrollen';
    });
    if(existingPoint&&pendingPhotoFiles.length)deletePhotoRefs(oldRefs);
  }).catch(function(err){
    alert(err&&err.message?err.message:'Fotos konnten nicht gespeichert werden.');
  });
}

}
